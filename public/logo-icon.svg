<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <clipPath id="gc-c">
      <circle cx="100" cy="100" r="85"/>
    </clipPath>
  </defs>

  <!-- Orbit ring — back half -->
  <ellipse cx="100" cy="100" rx="113" ry="26"
           transform="rotate(-18 100 100)"
           fill="none" stroke="#2ab5a0" stroke-width="7" stroke-opacity="0.45"
           stroke-linecap="round"/>

  <!-- Globe fill -->
  <circle cx="100" cy="100" r="85" fill="#1a2a6c"/>

  <!-- Grid lines — simplified for icon readability -->
  <g clip-path="url(#gc-c)" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="1.5">
    <!-- Horizontal parallels -->
    <ellipse cx="100" cy="100" rx="85" ry="20"/>
    <ellipse cx="100" cy="64"  rx="73" ry="17"/>
    <ellipse cx="100" cy="136" rx="73" ry="17"/>
    <!-- Vertical meridians -->
    <line x1="100" y1="15" x2="100" y2="185"/>
    <path d="M100,15 C62,55 62,145 100,185"/>
    <path d="M100,15 C138,55 138,145 100,185"/>
  </g>

  <!-- House — white silhouette (clipped) -->
  <g clip-path="url(#gc-c)">
    <!-- Roof -->
    <polygon points="100,48 62,78 138,78" fill="white"/>
    <!-- Body -->
    <rect x="66" y="78" width="68" height="54" fill="white"/>
    <!-- Door -->
    <rect x="83" y="100" width="34" height="32" fill="#1a2a6c" rx="2"/>
    <!-- Window left -->
    <rect x="70" y="84" width="18" height="15" fill="#1a2a6c" rx="1"/>
    <line x1="79" y1="84"   x2="79"  y2="99"   stroke="white" stroke-width="1.5"/>
    <line x1="70" y1="91.5" x2="88"  y2="91.5" stroke="white" stroke-width="1.5"/>
    <!-- Window right -->
    <rect x="112" y="84" width="18" height="15" fill="#1a2a6c" rx="1"/>
    <line x1="121" y1="84"   x2="121" y2="99"   stroke="white" stroke-width="1.5"/>
    <line x1="112" y1="91.5" x2="130" y2="91.5" stroke="white" stroke-width="1.5"/>
  </g>

  <!-- Orbit ring — front swoosh (on top of globe) -->
  <!-- Arc from A(184,91) to B(26,142) through orbit bottom (~108,124) -->
  <path d="M 184 91 A 113 26 -18 0 1 26 142"
        fill="none" stroke="#2ab5a0" stroke-width="7" stroke-linecap="round"/>
</svg>
